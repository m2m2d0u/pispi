spring:
  application:
    name: PI-SPI

  # ---- Database ----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pispi}
    username: ${DB_USERNAME:pispi}
    password: ${DB_PASSWORD:pispi}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ---- Sycapay PI-SPI Config ----
sycapay:
  pi-spi:
    code-membre: ${PISPI_CODE_MEMBRE:CIE002}
    aip-base-url: ${PISPI_AIP_BASE_URL:https://bceao.symmetry.sn:8081}
    aip-api-key: ${PISPI_AIP_API_KEY:CHANGE_ME}
    api-version: ${PISPI_API_VERSION:1}
    webhook-url: ${PISPI_WEBHOOK_URL:}

    # ---- mTLS ----
    mtls:
      keystore-path: ${PISPI_MTLS_KEYSTORE_PATH:classpath:client/client.p12}
      keystore-password: ${PISPI_MTLS_KEYSTORE_PASSWORD:}
      truststore-path: ${PISPI_MTLS_TRUSTSTORE_PATH:classpath:truststore/truststore.p12}
      truststore-password: ${PISPI_MTLS_TRUSTSTORE_PASSWORD:}
      keystore-type: ${PISPI_MTLS_KEYSTORE_TYPE:PKCS12}
      trust-all: ${PISPI_MTLS_TRUST_ALL:true}

# ---- Resilience4j ----
resilience4j:
  circuitbreaker:
    instances:
      aip:
        sliding-window-size: ${RESILIENCE_CB_WINDOW_SIZE:10}
        failure-rate-threshold: ${RESILIENCE_CB_FAILURE_RATE:50}
        wait-duration-in-open-state: ${RESILIENCE_CB_WAIT_DURATION:30s}
  retry:
    instances:
      aip:
        max-attempts: ${RESILIENCE_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${RESILIENCE_RETRY_WAIT_DURATION:2s}

# ---- Actuator ----
management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,env,loggers,flyway,circuitbreakers
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:when-authorized}
      show-components: ${ACTUATOR_HEALTH_DETAILS:when-authorized}
      probes:
        enabled: true
    loggers:
      enabled: true
    env:
      show-values: ${ACTUATOR_ENV_SHOW_VALUES:never}
  health:
    redis:
      enabled: true
    db:
      enabled: true
    circuitbreakers:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: PI-SPI Connector
    version: "@project.version@"
    description: "@project.description@"
  participant:
    code-membre: ${PISPI_CODE_MEMBRE:CIE002}
    aip-base-url: ${PISPI_AIP_BASE_URL:https://bceao.symmetry.sn:8081}

# ---- OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

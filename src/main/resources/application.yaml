spring:
  application:
    name: PI-SPI

  # ---- Database ----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pispi}
    username: ${DB_USERNAME:pispi}
    password: ${DB_PASSWORD:pispi}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ---- Kafka ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:pispi-connector}
      auto-offset-reset: earliest

# ---- Sycapay PI-SPI Config ----
sycapay:
  pi-spi:
    code-membre: ${PISPI_CODE_MEMBRE:CIF001}
    aip-base-url: ${PISPI_AIP_BASE_URL:https://aip-sandbox.bceao.int}
    aip-api-key: ${PISPI_AIP_API_KEY:CHANGE_ME}
    api-version: ${PISPI_API_VERSION:1}
    webhook-url: ${PISPI_WEBHOOK_URL:https://sycapay-backend.local/api/pi-spi/webhook}

    # ---- mTLS ----
    mtls:
      keystore-path: ${PISPI_MTLS_KEYSTORE_PATH:classpath:keystore.p12}
      keystore-password: ${PISPI_MTLS_KEYSTORE_PASSWORD:changeit}
      truststore-path: ${PISPI_MTLS_TRUSTSTORE_PATH:classpath:truststore.p12}
      truststore-password: ${PISPI_MTLS_TRUSTSTORE_PASSWORD:changeit}
      keystore-type: ${PISPI_MTLS_KEYSTORE_TYPE:PKCS12}

    # ---- Kafka Topics ----
    kafka:
      callback-topic: ${PISPI_KAFKA_CALLBACK_TOPIC:pi-spi-callback}
      webhook-topic: ${PISPI_KAFKA_WEBHOOK_TOPIC:pi-spi-webhook}

# ---- Resilience4j ----
resilience4j:
  circuitbreaker:
    instances:
      aip:
        sliding-window-size: ${RESILIENCE_CB_WINDOW_SIZE:10}
        failure-rate-threshold: ${RESILIENCE_CB_FAILURE_RATE:50}
        wait-duration-in-open-state: ${RESILIENCE_CB_WAIT_DURATION:30s}
  retry:
    instances:
      aip:
        max-attempts: ${RESILIENCE_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${RESILIENCE_RETRY_WAIT_DURATION:2s}

# ---- OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
